name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: clang-debug
            compiler: Clang 21 (Debug)
            install: clang
            extra_cmake_args: -DCMAKE_C_COMPILER=clang-21 -DCMAKE_CXX_COMPILER=clang++-21 -DENABLE_CLANG_TIDY=OFF
          - preset: clang-release
            compiler: Clang 21 (Release)
            install: clang
            extra_cmake_args: -DCMAKE_C_COMPILER=clang-21 -DCMAKE_CXX_COMPILER=clang++-21
          - preset: clang-release-static
            compiler: Clang 21 (Release, static)
            install: clang
            extra_cmake_args: -DCMAKE_C_COMPILER=clang-21 -DCMAKE_CXX_COMPILER=clang++-21
          - preset: clang-tsan
            compiler: Clang 21 (ThreadSanitizer)
            install: clang
            extra_cmake_args: -DCMAKE_C_COMPILER=clang-21 -DCMAKE_CXX_COMPILER=clang++-21
          - preset: gcc-debug
            compiler: GCC 14
            install: gcc
            extra_cmake_args:

    name: ${{ matrix.compiler }}

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      CCACHE_COMPRESS: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 21
        if: matrix.install == 'clang'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 21

      - name: Install GCC 14
        if: matrix.install == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Install dependencies
        run: sudo apt-get install -y ninja-build catch2 ccache

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ matrix.preset }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ matrix.preset }}-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} ${{ matrix.extra_cmake_args }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

      - name: Upload CLI executable
        if: matrix.preset == 'clang-release-static'
        uses: actions/upload-artifact@v4
        with:
          name: dude-linux-static
          path: build/${{ matrix.preset }}/src/cli/dude

  coverage:
    runs-on: ubuntu-24.04
    name: Code Coverage

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      CCACHE_COMPRESS: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 21
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 21

      - name: Install dependencies
        run: sudo apt-get install -y ninja-build catch2 ccache

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-clang-coverage-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-clang-coverage-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-clang-coverage-${{ github.sha }}
          restore-keys: ccache-clang-coverage-

      - name: Configure
        run: cmake --preset clang-coverage -DCMAKE_C_COMPILER=clang-21 -DCMAKE_CXX_COMPILER=clang++-21
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset clang-coverage

      - name: Generate coverage report
        run: cmake --build --preset clang-coverage --target coverage

      - name: Enforce minimum coverage (80%)
        run: |
          COVERAGE_JSON="build/clang-coverage/coverage-summary.json"
          llvm-cov-21 export build/clang-coverage/src/tests/dude_test \
            -instr-profile=build/clang-coverage/coverage.profdata \
            -summary-only -ignore-filename-regex=_deps/ \
            > "$COVERAGE_JSON"
          python3 -c "
          import json, sys
          with open('$COVERAGE_JSON') as f:
              data = json.load(f)
          totals = data['data'][0]['totals']
          lines = totals['lines']
          pct = lines['percent']
          print(f'Line coverage: {pct:.2f}% ({lines[\"covered\"]}/{lines[\"count\"]} lines)')
          sys.exit(0 if pct >= 80.0 else 1)
          "

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/clang-coverage/coverage/

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: cl-release
            compiler: MSVC
          - preset: clangcl-release
            compiler: Clang-CL

    name: ${{ matrix.compiler }}

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache

    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ matrix.preset }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

      - name: Upload CLI executable
        if: matrix.preset == 'clangcl-release'
        uses: actions/upload-artifact@v4
        with:
          name: dude-windows
          path: build/${{ matrix.preset }}/src/cli/dude.exe
