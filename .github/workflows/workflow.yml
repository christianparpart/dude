name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: clang-debug
            compiler: Clang 21 (Debug)
            install: clang
          - preset: clang-release
            compiler: Clang 21 (Release)
            install: clang
          - preset: gcc-debug
            compiler: GCC 15
            install: gcc

    name: ${{ matrix.compiler }}

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 21
        if: matrix.install == 'clang'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 21
          sudo apt-get install -y clang-tidy-21
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-21 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-21 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-21 100

      - name: Install GCC 15
        if: matrix.install == 'gcc'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-15 100

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ matrix.preset }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: cl-release
            compiler: MSVC
          - preset: clangcl-release
            compiler: Clang-CL

    name: ${{ matrix.compiler }}

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache

    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ matrix.preset }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

      - name: Upload CLI executable
        if: matrix.preset == 'clangcl-release'
        uses: actions/upload-artifact@v4
        with:
          name: dude
          path: build/${{ matrix.preset }}/src/cli/dude.exe
